name: CI — Fullstack

on:
  push:
    paths:
      - "templates/fullstack/**"
  pull_request:
    paths:
      - "templates/fullstack/**"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: templates/fullstack/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: templates/fullstack/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest app/tests/ -v

  frontend:
    name: Frontend lint & tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: templates/fullstack/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: templates/fullstack/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker-compose:
    name: Docker Compose build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: templates/fullstack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all services
        run: docker compose build
